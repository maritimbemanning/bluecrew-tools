<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding — Bluecrew</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy-800: #172a5c;
  --navy-700: #1a3278;
  --gold-500: #a08563;
  --gold-400: #bfa77d;
  --cream-50: #fdfcfa;
  --cream-100: #faf6f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: linear-gradient(165deg, var(--cream-50) 0%, var(--cream-100) 40%, #f0ebe3 100%);
  font-family: 'Inter', -apple-system, sans-serif;
  font-weight: 300;
  color: var(--navy-800);
}

.header {
  background: var(--navy-800);
  padding: 32px 40px;
  position: relative;
  overflow: hidden;
}

.header::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(26,50,120,0.27) 0%, transparent 70%);
  border-radius: 50%;
}

.header-inner {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.logo-text {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold-400);
  font-weight: 500;
  margin-bottom: 8px;
}

.title {
  font-size: 28px;
  font-weight: 500;
  color: var(--cream-50);
  letter-spacing: -0.5px;
}

.subtitle {
  font-size: 14px;
  color: rgba(191,167,125,0.8);
  margin-top: 6px;
  font-weight: 300;
}

.main {
  max-width: 800px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* Role selection */
.section-label {
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold-500);
  font-weight: 500;
  margin-bottom: 14px;
}

.role-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}

.role-card {
  padding: 16px 18px;
  border-radius: 12px;
  border: 1.5px solid #e0dbd4;
  background: white;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  font-weight: 400;
  font-family: 'Inter', sans-serif;
  color: var(--navy-800);
}

.role-card:hover {
  border-color: var(--gold-500);
  box-shadow: 0 2px 12px rgba(160,133,99,0.1);
}

.role-card.active {
  border-color: var(--navy-800);
  background: var(--navy-800);
  color: var(--cream-50);
  box-shadow: 0 4px 20px rgba(23,42,92,0.19);
}

.role-icon { font-size: 22px; flex-shrink: 0; }

/* Inputs */
.inputs-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 32px;
}

.input-group label {
  display: block;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold-500);
  font-weight: 500;
  margin-bottom: 6px;
}

.input-group input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e0dbd4;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--navy-800);
  background: white;
  outline: none;
  transition: border-color 0.2s;
}

.input-group input:focus { border-color: var(--navy-700); }

/* Top bar with role + button */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
  font-size: 16px;
}

.btn-switch {
  background: none;
  border: 1px solid #d0cbc4;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  color: var(--navy-800);
  cursor: pointer;
  font-style: italic;
  transition: border-color 0.2s;
}

.btn-switch:hover { border-color: var(--gold-500); }

/* Progress */
.progress-bar {
  background: #e8e3dc;
  border-radius: 100px;
  height: 6px;
  margin-bottom: 8px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 100px;
  background: linear-gradient(90deg, var(--gold-500), var(--gold-400));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.progress-text {
  font-size: 12px;
  color: var(--gold-500);
  font-weight: 400;
  margin-bottom: 32px;
  display: flex;
  justify-content: space-between;
}

/* Complete banner */
.complete-banner {
  background: linear-gradient(135deg, var(--navy-800), var(--navy-700));
  color: var(--cream-50);
  padding: 24px;
  border-radius: 14px;
  text-align: center;
  margin-bottom: 24px;
  display: none;
}

.complete-banner.show { display: block; }

.complete-banner h3 {
  font-weight: 500;
  font-size: 18px;
  margin-bottom: 4px;
  color: var(--gold-400);
}

.complete-banner p {
  font-size: 14px;
  font-weight: 300;
  color: rgba(253,252,250,0.8);
}

/* Phase */
.phase {
  margin-bottom: 16px;
  border-radius: 14px;
  background: white;
  border: 1px solid #e8e3dc;
  overflow: hidden;
  transition: box-shadow 0.3s;
}

.phase:hover { box-shadow: 0 2px 16px rgba(23,42,92,0.06); }

.phase-header {
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}

.phase-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.phase-icon { font-size: 22px; }

.phase-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--navy-800);
}

.phase-sub {
  font-size: 12px;
  color: var(--gold-500);
  font-weight: 300;
  margin-top: 1px;
}

.phase-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.phase-count {
  font-size: 12px;
  color: rgba(23,42,92,0.53);
  font-weight: 400;
  background: var(--cream-100);
  padding: 4px 10px;
  border-radius: 100px;
}

.phase-check {
  color: #16a34a;
  font-size: 16px;
  display: none;
}

.phase-check.show { display: inline; }

.chevron {
  width: 20px;
  height: 20px;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--navy-800);
}

.chevron.open { transform: rotate(180deg); }

.tasks {
  padding: 0 22px 18px;
  display: none;
}

.tasks.open { display: block; }

.task {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-top: 1px solid #f0ebe3;
  align-items: flex-start;
  transition: opacity 0.3s;
}

.task.done { opacity: 0.5; }

.checkbox {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 1.5px solid #d0cbc4;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  background: white;
  margin-top: 1px;
}

.checkbox.checked {
  background: var(--navy-800);
  border-color: var(--navy-800);
}

.checkbox.checked svg { display: block; }
.checkbox svg { display: none; }

.checkbox:hover { border-color: var(--gold-500); }

.task-content { flex: 1; min-width: 0; }

.task-text {
  font-size: 14px;
  font-weight: 400;
  color: var(--navy-800);
  line-height: 1.5;
}

.task.done .task-text {
  text-decoration: line-through;
  color: rgba(23,42,92,0.4);
}

.task-meta {
  display: flex;
  gap: 16px;
  margin-top: 5px;
  flex-wrap: wrap;
}

.task-tag {
  font-size: 11px;
  font-weight: 400;
  color: rgba(23,42,92,0.53);
  display: flex;
  align-items: center;
  gap: 4px;
}

.task-tag span { color: var(--gold-500); }

.critical-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: #b45309;
  background: #fef3c7;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 5px;
}

.fade-in {
  opacity: 0;
  transform: translateY(12px);
  animation: fadeIn 0.5s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

#role-select { animation-delay: 0.1s; }
#checklist-view { animation-delay: 0.05s; }

@media (max-width: 600px) {
  .role-grid { grid-template-columns: 1fr; }
  .inputs-row { grid-template-columns: 1fr; }
  .header { padding: 24px 20px; }
  .main { padding: 24px 16px 60px; }
  .title { font-size: 22px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-text">Bluecrew</div>
    <div class="title">Onboarding-sjekkliste</div>
    <div class="subtitle">Interne ansatte — salg, koordinering, admin & ledelse</div>
  </div>
</div>

<div class="main">
  <div id="role-select" class="fade-in">
    <div class="section-label">Velg rolle</div>
    <div class="role-grid">
      <div class="role-card" data-role="salg" onclick="selectRole('salg', this)">
        <span class="role-icon">📊</span> Salgsleder / BDM
      </div>
      <div class="role-card" data-role="koordinator" onclick="selectRole('koordinator', this)">
        <span class="role-icon">🔗</span> Koordinator
      </div>
      <div class="role-card" data-role="admin" onclick="selectRole('admin', this)">
        <span class="role-icon">📋</span> Admin / Økonomi
      </div>
      <div class="role-card" data-role="leder" onclick="selectRole('leder', this)">
        <span class="role-icon">⚙️</span> Avdelingsleder
      </div>
    </div>
  </div>

  <div id="checklist-view" class="fade-in" style="display:none;">
    <div class="top-bar">
      <div class="top-bar-left">
        <span id="selected-icon"></span>
        <span id="selected-label"></span>
      </div>
      <button class="btn-switch" onclick="resetRole()">Bytt rolle</button>
    </div>

    <div class="inputs-row">
      <div class="input-group">
        <label>Navn på ansatt</label>
        <input type="text" id="emp-name" placeholder="F.eks. Sondre Kirkeng-Rørmyr">
      </div>
      <div class="input-group">
        <label>Oppstartsdato</label>
        <input type="date" id="emp-date">
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text">
      <span id="progress-label">0 av 0 oppgaver fullført</span>
      <span id="progress-pct">0%</span>
    </div>

    <div class="complete-banner" id="complete-banner">
      <h3>Onboarding fullført ✓</h3>
      <p id="complete-text">Den ansatte er klar for å levere. Velkommen til Bluecrew.</p>
    </div>

    <div id="phases-container"></div>
  </div>
</div>

<script>
const ROLES_META = {
  salg: { icon: '📊', label: 'Salgsleder / BDM' },
  koordinator: { icon: '🔗', label: 'Koordinator' },
  admin: { icon: '📋', label: 'Admin / Økonomi' },
  leder: { icon: '⚙️', label: 'Avdelingsleder' }
};

const PHASES = [
  {
    id: 'pre', title: 'Før oppstart', subtitle: '1–2 uker før første dag', icon: '📦',
    tasks: [
      { id: 'kontrakt', text: 'Signere arbeidskontrakt', ansvarlig: 'Daglig leder', frist: 'Senest 7 dager før oppstart', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'personalskjema', text: 'Fylle ut personalskjema (bankinfo, kontaktinfo, pårørende)', ansvarlig: 'Ny ansatt', frist: 'Senest 5 dager før oppstart', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'skattkort', text: 'Innhente skattekort og registrere i Tripletex', ansvarlig: 'Admin / Økonomi', frist: 'Før første lønnskjøring', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'pc', text: 'Bestille og klargjøre PC/Mac + telefon', ansvarlig: 'Daglig leder', frist: 'Klart til dag 1', roles: ['salg','koordinator','admin','leder'] },
      { id: 'google', text: 'Opprette Google Workspace-konto (@bluecrew.no)', ansvarlig: 'Daglig leder', frist: 'Senest 2 dager før oppstart', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'slack', text: 'Invitere til Slack-workspace + relevante kanaler', ansvarlig: 'Daglig leder', frist: 'Dag 1', roles: ['salg','koordinator','admin','leder'] },
      { id: 'tripletex_bruker', text: 'Opprette bruker i Tripletex', ansvarlig: 'Admin / Økonomi', frist: 'Før oppstart', roles: ['salg','koordinator','admin','leder'] },
      { id: 'hubspot_bruker', text: 'Opprette bruker i HubSpot CRM', ansvarlig: 'Daglig leder', frist: 'Dag 1', roles: ['salg','koordinator'] },
      { id: 'velkomst', text: 'Sende velkomstmelding med praktisk info (oppmøte, kleskode, parkering)', ansvarlig: 'Daglig leder', frist: '2 dager før oppstart', roles: ['salg','koordinator','admin','leder'] },
      { id: 'visittkort', text: 'Bestille visittkort med Bluecrew-profil', ansvarlig: 'Daglig leder', frist: 'Innen uke 1', roles: ['salg','leder'] }
    ]
  },
  {
    id: 'dag1', title: 'Dag 1', subtitle: 'Første arbeidsdag', icon: '🚀',
    tasks: [
      { id: 'velkomst_fysisk', text: 'Velkomstmøte med daglig leder — gjennomgang av visjon, verdier og forventninger', ansvarlig: 'Daglig leder', frist: 'Morgen dag 1', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'utstyr', text: 'Utlevere PC, telefon, nøkler/adgangskort', ansvarlig: 'Daglig leder', frist: 'Dag 1', roles: ['salg','koordinator','admin','leder'] },
      { id: 'systemer_setup', text: 'Sette opp e-post, Slack, Google Drive og e-signatur', ansvarlig: 'Ny ansatt + Daglig leder', frist: 'Dag 1', roles: ['salg','koordinator','admin','leder'] },
      { id: 'hms_intro', text: 'Gjennomgang av HMS-rutiner og beredskapsplan', ansvarlig: 'HMS-ansvarlig', frist: 'Dag 1', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'orgkart', text: 'Presentere organisasjonskart og nøkkelpersoner', ansvarlig: 'Daglig leder', frist: 'Dag 1', roles: ['salg','koordinator','admin','leder'] },
      { id: 'crm_intro', text: 'Introduksjon til HubSpot CRM — pipeline, kontakter, workflow', ansvarlig: 'Salgsleder', frist: 'Dag 1', roles: ['salg'] },
      { id: 'tripletex_intro', text: 'Introduksjon til Tripletex — fakturering, lønn, rapporter', ansvarlig: 'Admin / Økonomi', frist: 'Dag 1', roles: ['admin'] },
      { id: 'kandidatbase', text: 'Gjennomgang av kandidatbase og tildelingsrutiner', ansvarlig: 'Daglig leder', frist: 'Dag 1', roles: ['koordinator'] },
      { id: 'lunsj', text: 'Felles lunsj med teamet', ansvarlig: 'Daglig leder', frist: 'Dag 1', roles: ['salg','koordinator','admin','leder'] }
    ]
  },
  {
    id: 'uke1', title: 'Uke 1', subtitle: 'Dag 2–5', icon: '📅',
    tasks: [
      { id: 'bransjekunnskap', text: 'Gjennomgang av bransjevertikaler: havbruk, offshore, industri/verft', ansvarlig: 'Daglig leder / Cato', frist: 'Innen dag 3', roles: ['salg','koordinator','admin','leder'] },
      { id: 'kundeoversikt', text: 'Gjennomgang av aktive kunder og pipeline (Norgeskjel, Westcon, Trident, etc.)', ansvarlig: 'Salgsleder / Daglig leder', frist: 'Innen dag 3', roles: ['salg','koordinator'], critical: true },
      { id: 'kontraktstyper', text: 'Forstå kontraktstyper: AML-track vs MLC-track, midlertidig vs fast', ansvarlig: 'Daglig leder', frist: 'Innen dag 5', roles: ['salg','koordinator','admin'] },
      { id: 'prismatrise', text: 'Gjennomgang av prismatriser per segment', ansvarlig: 'Daglig leder', frist: 'Innen dag 5', roles: ['salg'], critical: true },
      { id: 'shadow_salg', text: 'Skygge salgsmøte / kundedialog', ansvarlig: 'Salgsleder', frist: 'Innen uke 1', roles: ['salg'] },
      { id: 'shadow_koordinering', text: 'Skygge koordineringsarbeid — tildeling, oppfølging, timeregistrering', ansvarlig: 'Thomas Olsen', frist: 'Innen uke 1', roles: ['koordinator'] },
      { id: 'nho_bemanning', text: 'Introduksjon til NHO Bemanning-medlemskap og bransjenormer', ansvarlig: 'Daglig leder', frist: 'Innen uke 1', roles: ['salg','koordinator','leder'] },
      { id: 'slack_rutiner', text: 'Gjennomgang av interne Slack-kanaler og kommunikasjonsrutiner', ansvarlig: 'Daglig leder', frist: 'Dag 2', roles: ['salg','koordinator','admin','leder'] },
      { id: 'ukentlig_standup', text: 'Delta på første ukentlige standup/statusmøte', ansvarlig: 'Ny ansatt', frist: 'Innen uke 1', roles: ['salg','koordinator','admin','leder'] }
    ]
  },
  {
    id: 'maaned1', title: 'Første måned', subtitle: 'Uke 2–4', icon: '🎯',
    tasks: [
      { id: '30d_plan', text: 'Sette konkrete 30-dagers mål sammen med daglig leder', ansvarlig: 'Daglig leder + Ny ansatt', frist: 'Innen dag 10', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'selvstendig_crm', text: 'Selvstendig bruk av HubSpot — logge aktiviteter, oppdatere pipeline', ansvarlig: 'Ny ansatt', frist: 'Innen uke 2', roles: ['salg'] },
      { id: 'selvstendig_koordinering', text: 'Selvstendig tildeling av mannskap til oppdrag', ansvarlig: 'Ny ansatt', frist: 'Innen uke 3', roles: ['koordinator'] },
      { id: 'selvstendig_faktura', text: 'Selvstendig fakturering og lønnskjøring i Tripletex', ansvarlig: 'Ny ansatt', frist: 'Innen uke 3', roles: ['admin'] },
      { id: 'foerste_kunde', text: 'Gjennomføre første selvstendige kundemøte/-samtale', ansvarlig: 'Ny ansatt', frist: 'Innen uke 3', roles: ['salg'], critical: true },
      { id: 'feedback_runde', text: 'Første formelle feedback-samtale med daglig leder', ansvarlig: 'Daglig leder', frist: 'Etter 3 uker', roles: ['salg','koordinator','admin','leder'], critical: true },
      { id: 'nettverk', text: 'Bygge intern kontaktliste: nøkkelkontakter hos kunder og samarbeidspartnere', ansvarlig: 'Ny ansatt', frist: 'Innen måned 1', roles: ['salg','koordinator'] },
      { id: 'prosedyrer_doc', text: 'Lese gjennom alle relevante prosedyrer og rutinedokumenter', ansvarlig: 'Ny ansatt', frist: 'Innen uke 4', roles: ['salg','koordinator','admin','leder'] },
      { id: 'probation_forventninger', text: 'Tydeliggjøre forventninger for prøvetid (6 mnd) — KPI-er og milepæler', ansvarlig: 'Daglig leder', frist: 'Innen måned 1', roles: ['salg','koordinator','admin','leder'], critical: true }
    ]
  }
];

let currentRole = null;
let checkedState = {};
let openPhases = { pre: true };

function selectRole(role) {
  currentRole = role;
  checkedState = {};
  openPhases = { pre: true };
  document.getElementById('role-select').style.display = 'none';
  const cv = document.getElementById('checklist-view');
  cv.style.display = 'block';
  cv.classList.remove('fade-in');
  void cv.offsetWidth;
  cv.classList.add('fade-in');
  document.getElementById('selected-icon').textContent = ROLES_META[role].icon;
  document.getElementById('selected-label').textContent = ROLES_META[role].label;
  document.getElementById('emp-name').value = '';
  document.getElementById('emp-date').value = '';
  renderPhases();
  updateProgress();
}

function resetRole() {
  currentRole = null;
  document.getElementById('checklist-view').style.display = 'none';
  const rs = document.getElementById('role-select');
  rs.style.display = 'block';
  rs.classList.remove('fade-in');
  void rs.offsetWidth;
  rs.classList.add('fade-in');
}

function togglePhase(phaseId) {
  openPhases[phaseId] = !openPhases[phaseId];
  const tasks = document.getElementById('tasks-' + phaseId);
  const chevron = document.getElementById('chevron-' + phaseId);
  if (openPhases[phaseId]) {
    tasks.classList.add('open');
    chevron.classList.add('open');
  } else {
    tasks.classList.remove('open');
    chevron.classList.remove('open');
  }
}

function toggleCheck(taskId) {
  checkedState[taskId] = !checkedState[taskId];
  const taskEl = document.getElementById('task-' + taskId);
  const cbEl = document.getElementById('cb-' + taskId);
  if (checkedState[taskId]) {
    taskEl.classList.add('done');
    cbEl.classList.add('checked');
  } else {
    taskEl.classList.remove('done');
    cbEl.classList.remove('checked');
  }
  updateProgress();
}

function getFilteredTasks(phase) {
  return phase.tasks.filter(t => t.roles.includes(currentRole));
}

function updateProgress() {
  let total = 0, done = 0;
  PHASES.forEach(phase => {
    const tasks = getFilteredTasks(phase);
    total += tasks.length;
    done += tasks.filter(t => checkedState[t.id]).length;
    // Update phase count
    const phaseDone = tasks.filter(t => checkedState[t.id]).length;
    const countEl = document.getElementById('count-' + phase.id);
    const checkEl = document.getElementById('phasecheck-' + phase.id);
    if (countEl) countEl.textContent = phaseDone + '/' + tasks.length;
    if (checkEl) {
      checkEl.classList.toggle('show', phaseDone === tasks.length && tasks.length > 0);
    }
  });

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' av ' + total + ' oppgaver fullført';
  document.getElementById('progress-pct').textContent = pct + '%';

  const banner = document.getElementById('complete-banner');
  if (pct === 100 && total > 0) {
    const name = document.getElementById('emp-name').value || 'Den ansatte';
    document.getElementById('complete-text').textContent = name + ' er klar for å levere. Velkommen til Bluecrew.';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function renderPhases() {
  const container = document.getElementById('phases-container');
  container.innerHTML = '';

  PHASES.forEach((phase, pi) => {
    const tasks = getFilteredTasks(phase);
    if (tasks.length === 0) return;

    const isOpen = !!openPhases[phase.id];
    const phaseDone = tasks.filter(t => checkedState[t.id]).length;

    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase fade-in';
    phaseEl.style.animationDelay = (0.1 + pi * 0.08) + 's';

    let tasksHtml = '';
    tasks.forEach(task => {
      const isDone = !!checkedState[task.id];
      tasksHtml += `
        <div class="task ${isDone ? 'done' : ''}" id="task-${task.id}">
          <div class="checkbox ${isDone ? 'checked' : ''}" id="cb-${task.id}" onclick="toggleCheck('${task.id}')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="${'var(--gold-400)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="task-content">
            <div class="task-text">${task.text}</div>
            <div class="task-meta">
              <div class="task-tag"><span>→</span> ${task.ansvarlig}</div>
              <div class="task-tag"><span>⏱</span> ${task.frist}</div>
            </div>
            ${task.critical ? '<div class="critical-tag">Kritisk</div>' : ''}
          </div>
        </div>`;
    });

    phaseEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <div class="phase-left">
          <span class="phase-icon">${phase.icon}</span>
          <div>
            <div class="phase-title">${phase.title}</div>
            <div class="phase-sub">${phase.subtitle}</div>
          </div>
        </div>
        <div class="phase-right">
          <span class="phase-count" id="count-${phase.id}">${phaseDone}/${tasks.length}</span>
          <span class="phase-check ${phaseDone === tasks.length ? 'show' : ''}" id="phasecheck-${phase.id}">✓</span>
          <svg class="chevron ${isOpen ? 'open' : ''}" id="chevron-${phase.id}" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="tasks ${isOpen ? 'open' : ''}" id="tasks-${phase.id}">
        ${tasksHtml}
      </div>`;

    container.appendChild(phaseEl);
  });
}

// Listen for name changes to update banner
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('emp-name').addEventListener('input', updateProgress);
});
</script>

</body>
</html>
